openapi: 3.0.3
info:
  title: Game Studio API - Sbarter Integration (Client Implementation)
  version: 1.0.0
  description:
      This OpenAPI specification defines the standard interface and endpoints that the Game Studio is required to implement for integration.  
      Note: These specifications serve as a functional template and are not a live, callable API. In the production ecosystem, these endpoints 
      are invoked by Sbarter via the Virtual Game Processor (VGP).  
      Developers should use this document as a blueprint to build the local endpoints necessary for Sbarter to retrieve required game data. 
      While this specification provides the baseline requirements, it should be adapted and extended to align with the specific technical 
      architecture and capabilities of your game.
servers:
  - url: https://game-studio.example.com
    description: Game Studio base URL that must be accessible to Sbarter

security:
  - ApiKeyAuth: []

tags:
  - name: VGP - In App Confirmation
    description: Account linking initiation via in-app confirmation (Sbarter -> Game Studio)
  - name: Session
    description: Session registration on Game Studio side (Sbarter -> Game Studio)

paths:
  /v1/sbarter/gamer/validate/in-app:
    post:
      tags: [VGP - In App Confirmation]
      summary: Initiate in-app confirmation linking
      description: |
        Starts a high-trust verification process to link a Sbarter account with a Game Studio User ID (UID). 
    
        **Studio Responsibility & Workflow:**
        1. **Authentication:** Upon receiving the `UID`, the Studio must first ensure the player is actively logged into the game or a secure Studio portal.
        2. **User Challenge:** The Studio must present a clear, in-game alert or modal to the player. This challenge should explicitly state that a request was made via **Sbarter** at the current timestamp.
        3. **Intent Confirmation:** The player must manually "Approve" or "Deny" that they initiated this specific request. This prevents unauthorized third-party linking.
        4. **Callback Execution:** After the player interacts with the prompt, the Studio must asynchronously invoke the `webhookUrl` provided in the initial request to report the final `status` (e.g., `verified` or `rejected`).
    
        *Note: This endpoint should return an immediate `202 Accepted` to Sbarter, as the actual verification is completed asyncronously via the webhook once the player responds.*
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InAppConfirmationRequest'
      responses:
        "202":
          description: Accepted for processing
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid API key
        "429":
          description: Too many requests
        "500":
          description: Internal server error

  /v1/session:
    post:
      tags: [Session]
      summary: Register a game session
      description: >
        Registers a new game session on the Game Studio side, linked to an internal Sbarter sessionId.
        The provided webhookUrl MUST be used when sending results back to Sbarter.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        "201":
          description: Session successfully registered
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid API key
        "429":
          description: Too many requests
        "500":
          description: Internal server error

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Partner API key issued by the Game Studio for Sbarter to call Game Studio endpoints.

  schemas:
    InAppConfirmationRequest:
      type: object
      required: [internalId, providerGameId, providerUserId, expiresAt, webhookUrl]
      properties:
        internalId:
          type: string
          description: "unique sbarter identification"
          example: "someuuidorsometihingelse"
        providerGameId:
          type: string
          example: "some-game-id"
        providerUserId:
          type: string
          example: "user123456"
        expiresAt:
          type: string
          format: date-time
          example: "2025-12-12T13:00:00Z"
        webhookUrl:
          type: string
          format: uri
          description: later call the webhookUrl (Sbarter endpoint) with the final decision.
          example: "https://api.sbarter.com/v1/game-studio/user/linking/in-app/webhook"

    PlayerMatchEntry:
      type: object
      required: [internalId, providerUserId]
      properties:
        providerUserId:
          type: string
          example: "Player#1234"
        internalId:
          type: string
          example: "user-12345"

    SessionCreateRequest:
      type: object
      required: [providerGameId, sessionId, players, webhookUrl]
      properties:
        providerGameId:
          type: string
          example: "real boxing 3"
        sessionId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        players:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/PlayerMatchEntry'
        rules:
          type: array
          items:
            type: string
          example: ["rule12313", "someloremipsum"]
        webhookUrl:
          type: string
          format: uri
          example: "https://api.sbarter.com/v1/webhooks/game-studio/match-result"
